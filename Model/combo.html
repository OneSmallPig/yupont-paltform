<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多算法组合 - 煜邦视觉算法平台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="page-combo" data-page="combo">
  <div class="page-bg"></div>
  <header class="site-header"></header>

  <main class="main-shell page-shell combo-page-shell">
    <nav class="breadcrumb">
      <a href="./index.html">首页</a>
      <span>/</span>
      <a href="./market.html">算法商城</a>
      <span>/</span>
      <strong>多算法组合</strong>
    </nav>

    <section class="page-hero combo-page-hero">
      <div class="page-hero-copy combo-hero-copy">
        <p class="eyebrow">Multi-Algorithm Pipeline</p>
        <h1>多算法组合检测</h1>
        <p>从算法列表中选择多个能力模块，统一上传图片或多媒体流，完成组合检测、结果预览与导出，适合方案演示与联合识别流程验证。</p>
      </div>
      <div class="page-hero-aside combo-hero-aside">
        <strong>组合方式</strong>
        <p>支持按算法分类筛选、批量加入组合，并沿用平台现有的图片上传、多媒体流上传、结果预览和导出流程。</p>
      </div>
    </section>

    <section class="combo-page-layout">
      <aside class="combo-selection-column">
        <section class="section-card combo-selection-panel">
          <div class="panel-head combo-selection-head">
            <div>
              <p class="eyebrow">Algorithm Picker</p>
              <h3>组合算法选择</h3>
            </div>
          </div>

          <label class="combo-search-wrap" for="comboSearchInput">
            <input id="comboSearchInput" type="search" placeholder="搜索算法名称、场景、行业">
          </label>

          <div class="combo-filter-cluster" id="comboCategoryTabs"></div>
          <div class="combo-selected-strip" id="comboSelectedSummary"></div>
          <div class="combo-algorithm-list" id="comboAlgorithmList"></div>
        </section>
      </aside>

      <div class="combo-main">
        <section class="section-card algorithm-workbench">
          <div class="panel-head algorithm-section-head compact-head">
            <div>
              <p class="eyebrow">Combined Detection</p>
              <h3>组合在线检测</h3>
            </div>
          </div>

          <div class="detect-toolbar">
            <div class="upload-tabs" id="uploadTabs">
              <button class="tab-pill active" type="button" data-upload-tab="image">图片上传</button>
              <button class="tab-pill" type="button" data-upload-tab="media">多媒体流上传</button>
            </div>
          </div>

          <div class="combo-workbench-summary" id="comboWorkbenchSummary"></div>
          <div class="upload-panel" id="uploadPanel"></div>

          <div class="action-row algorithm-action-row combo-action-row">
            <button class="primary-btn detection-run-btn" type="button" id="runDetectionBtn">开始组合检测</button>
          </div>
        </section>

        <section class="section-card result-section" id="resultSection">
          <div class="panel-head algorithm-section-head compact-head">
            <div>
              <p class="eyebrow">Detection Result</p>
              <h3>检测结果</h3>
            </div>
            <span class="status-chip" id="resultStatus">等待检测</span>
          </div>
          <div class="detection-result-layout">
            <div class="result-preview" id="resultPreview"></div>
            <div class="result-metrics" id="resultMetrics"></div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div class="modal-shell" id="exportPreviewModal">
    <div class="modal-mask" data-close-modal="exportPreviewModal"></div>
    <div class="modal-card export-modal-card">
      <button class="modal-close" type="button" data-close-modal="exportPreviewModal">×</button>
      <div class="modal-head">
        <p class="eyebrow" id="exportPreviewEyebrow">Export Preview</p>
        <h3 id="exportPreviewTitle">导出预览</h3>
        <p id="exportPreviewDesc">预览导出内容后再执行文件导出。</p>
      </div>
      <div class="export-preview-body" id="exportPreviewBody"></div>
      <div class="modal-actions">
        <button class="ghost-btn" type="button" data-close-modal="exportPreviewModal">关闭</button>
        <button class="primary-btn" type="button" id="exportConfirmBtn">导出文件</button>
      </div>
    </div>
  </div>

  <script src="./platform-data.js"></script>
  <script src="./common.js"></script>
  <script src="./combo.js"></script>
</body>
</html>
