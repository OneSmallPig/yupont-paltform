<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算法商城 - 煜邦视觉算法平台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="market">
  <div class="page-bg"></div>
  <header class="site-header site-header-solid"></header>

  <main class="main-shell page-shell">
    <section class="banner-card page-banner">
      <div>
        <p class="eyebrow">Algorithm Marketplace</p>
        <h2>按算法分类与行业场景快速查找能力</h2>
        <p>支持按算法类型与行业场景筛选，查看详情并进入在线检测流程。</p>
      </div>
      <div class="status-card">
        <span>平台定位</span>
        <strong>算法展示与在线验证</strong>
        <p>面向售前演示、客户交流与场景方案组合。</p>
      </div>
    </section>

    <section class="market-toolbar">
      <div class="toolbar-group" id="categoryTabs"></div>
      <div class="toolbar-row">
        <div class="toolbar-group" id="industryTabs"></div>
        <div class="search-group">
          <input id="searchInput" type="search" placeholder="搜索算法名称、场景、标签">
        </div>
      </div>
    </section>

    <section class="market-layout">
      <div class="algo-grid market-grid" id="marketAlgoGrid"></div>
      <aside class="detail-panel" id="detailPanel"></aside>
    </section>
  </main>

  <script src="./platform-data.js"></script>
  <script src="./common.js"></script>
  <script src="./market.js"></script>
</body>
</html>
