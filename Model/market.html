<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算法商城 - 煜邦视觉算法平台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="page-market" data-page="market">
  <div class="page-bg"></div>
  <header class="site-header"></header>

  <main class="main-shell page-shell">
    <section class="market-hero-banner">
      <div class="market-hero-media"></div>
      <div class="market-hero-overlay"></div>
      <div class="market-hero-content">
        <div class="market-hero-copy">
          <p class="eyebrow">Algorithm Marketplace</p>
          <h1>围绕电网场景组织可直接演示的算法能力</h1>
          <p>面向输电、变电、配网、光伏与安监等典型场景，集中展示平台可直接浏览、收藏与进入详情页的核心算法能力，让用户在进入商城时先看到价值，再决定下一步要深入哪一类能力。</p>
          <div class="hero-action-row market-hero-actions">
            <button class="market-demand-btn" type="button" id="openDemandModal">
              <span>定制需求</span>
              <i aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <div class="market-hero-console-wrap">
          <button class="market-console-toggle" type="button" aria-label="展开搜索与筛选">
            <span>筛选</span>
          </button>
          <div class="market-hero-console">
            <div class="market-search-panel">
              <div class="market-search-input-wrap">
                <div class="market-search-field">
                  <input id="searchInput" type="search" placeholder="算法名称、行业场景、业务标签">
                  <button class="market-reset-toggle" type="button" id="resetFilterBtn" aria-label="重置筛选" title="重置筛选"></button>
                </div>
                <button class="market-collect-toggle" type="button" id="favoriteFilterBtn" aria-label="仅看收藏"></button>
              </div>
            </div>

            <div class="market-hero-filter-block">
              <span class="market-filter-label">一级分类</span>
              <div class="market-filter-cluster" id="categoryTabs"></div>
            </div>

            <div class="market-hero-filter-block market-sub-filter-block" id="industryFilterBlock" hidden>
              <span class="market-filter-label">二级分类</span>
              <div class="market-filter-cluster market-filter-cluster-soft" id="industryTabs"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="market-grid-section">
      <div class="market-section-head">
        <div>
          <p class="eyebrow">Catalog</p>
          <h2>算法能力陈列</h2>
        </div>
        <div class="market-section-actions">
          <button class="ghost-btn market-combo-trigger" type="button" id="marketComboToggleBtn">
            <span class="market-combo-trigger-box" aria-hidden="true"></span>
            <span>多算法组合</span>
          </button>
          <button class="primary-btn market-combo-submit" type="button" id="marketComboSubmitBtn" hidden>提交组合</button>
          <p class="market-result-meta" id="marketResultMeta">正在加载算法数据...</p>
        </div>
      </div>
      <div class="algo-grid market-grid" id="marketAlgoGrid"></div>
    </section>
  </main>

  <div class="modal-shell" id="demandModal">
    <div class="modal-mask" data-close-modal="demandModal"></div>
    <div class="modal-card demand-modal-card">
      <button class="modal-close" type="button" data-close-modal="demandModal">×</button>
      <div class="modal-head">
        <p class="eyebrow">Custom Request</p>
        <h3>提交定制需求</h3>
        <p>填写联系人信息与需求描述，便于我们按行业场景和算法能力进行定向沟通。</p>
      </div>
      <form class="demand-form" id="demandForm">
        <div class="demand-form-grid">
          <label>
            <span>姓名</span>
            <input name="name" type="text" placeholder="请输入姓名" required>
          </label>
          <label>
            <span>电话</span>
            <input name="phone" type="tel" placeholder="请输入联系电话" required>
          </label>
          <label>
            <span>公司名称</span>
            <input name="company" type="text" placeholder="请输入公司名称" required>
          </label>
          <label>
            <span>职务</span>
            <input name="title" type="text" placeholder="请输入职务" required>
          </label>
        </div>
        <label>
          <span>需求描述</span>
          <textarea name="requirement" placeholder="请描述项目背景、关注场景、期望算法能力或交付方式" required></textarea>
        </label>
        <div class="demand-form-actions">
          <span class="demand-form-note" id="demandFormNote">提交后将进入定制需求跟进流程。</span>
          <button class="primary-btn" type="submit">提交需求</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./platform-data.js"></script>
  <script src="./common.js"></script>
  <script src="./market.js"></script>
</body>
</html>
