<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算法商城 - 煜邦视觉算法平台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-bg"></div>

  <header class="site-header site-header-solid">
    <div class="header-inner">
      <a class="brand" href="./index.html">
        <div class="brand-logo">
          <img src="./logo.png" alt="煜邦电力 Logo">
        </div>
        <div class="brand-copy">
          <strong>煜邦视觉算法平台</strong>
          <span>北京煜邦电力技术股份有限公司</span>
        </div>
      </a>
      <nav class="top-nav">
        <a class="nav-link" href="./index.html">首页</a>
        <a class="nav-link active" href="./market.html">算法商城</a>
        <a class="nav-link" href="./llm.html">大模型</a>
        <a class="nav-link" href="./resources.html">资源中心</a>
      </nav>
      <div class="header-actions">
        <a class="ghost-btn" href="./resources.html">获取资料</a>
        <a class="primary-btn" href="./resources.html">预约演示</a>
      </div>
    </div>
  </header>

  <main class="main-shell page-shell">
    <section class="banner-card page-banner">
      <div>
        <p class="eyebrow">Algorithm Marketplace</p>
        <h2>按算法分类与行业场景快速查找能力</h2>
        <p>支持按算法类型与行业场景筛选，查看详情并形成标准化演示路径。</p>
      </div>
      <div class="status-card">
        <span>平台定位</span>
        <strong>算法展示与验证</strong>
        <p>面向售前演示、客户交流与场景方案组合。</p>
      </div>
    </section>

    <section class="market-toolbar">
      <div class="toolbar-group" id="categoryTabs"></div>
      <div class="toolbar-row">
        <div class="toolbar-group" id="industryTabs"></div>
        <div class="search-group">
          <input id="searchInput" type="search" placeholder="搜索算法名称、场景、标签">
        </div>
      </div>
    </section>

    <section class="market-layout">
      <div class="algo-grid market-grid" id="marketAlgoGrid"></div>
      <aside class="detail-panel" id="detailPanel"></aside>
    </section>
  </main>

  <script src="./platform-data.js"></script>
  <script src="./market.js"></script>
</body>
</html>
