<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算法详情 - 煜邦视觉算法平台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="market">
  <div class="page-bg"></div>
  <header class="site-header site-header-solid"></header>

  <main class="main-shell page-shell">
    <nav class="breadcrumb">
      <a href="./index.html">首页</a>
      <span>/</span>
      <a href="./market.html">算法商城</a>
      <span>/</span>
      <strong id="detailBreadcrumb">算法详情</strong>
    </nav>

    <section class="algorithm-hero" id="algorithmHero"></section>

    <section class="algorithm-layout">
      <div class="detection-panel">
        <div class="section-card">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Online Detection</p>
              <h3>在线检测</h3>
            </div>
            <label class="combo-toggle">
              <input type="checkbox" id="comboToggle">
              <span>多算法组合检测</span>
            </label>
          </div>

          <div class="combo-panel" id="comboPanel"></div>

          <div class="upload-tabs">
            <button class="tab-pill active" type="button">图片上传</button>
            <button class="tab-pill" type="button">视频/多媒体</button>
          </div>

          <label class="upload-zone" for="detectionFile">
            <input id="detectionFile" type="file" accept="image/*,video/*">
            <div class="upload-zone-copy">
              <strong>上传检测素材</strong>
              <p>支持 JPG、PNG、MP4 等文件，上传后将自动生成预览。</p>
            </div>
            <div class="upload-preview" id="uploadPreview"></div>
          </label>

          <div class="action-row">
            <button class="primary-btn" type="button" id="runDetectionBtn">开始检测</button>
            <button class="ghost-btn" type="button" id="previewJsonBtn" disabled>预览 JSON</button>
            <button class="ghost-btn" type="button" id="previewPdfBtn" disabled>预览 PDF</button>
          </div>
        </div>

        <div class="section-card result-section" id="resultSection">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Detection Result</p>
              <h3>检测结果</h3>
            </div>
            <span class="status-chip" id="resultStatus">等待检测</span>
          </div>
          <div class="detection-result-layout">
            <div class="result-preview" id="resultPreview"></div>
            <div class="result-metrics" id="resultMetrics"></div>
          </div>
        </div>
      </div>

      <aside class="algorithm-sidebar" id="algorithmSidebar"></aside>
    </section>
  </main>

  <div class="modal-shell" id="exportModal">
    <div class="modal-mask" data-close-modal="exportModal"></div>
    <div class="modal-card export-card">
      <button class="modal-close" type="button" data-close-modal="exportModal">×</button>
      <div class="modal-head">
        <p class="eyebrow" id="exportTypeLabel">Export Preview</p>
        <h3 id="exportTitle">结果预览</h3>
      </div>
      <div class="export-preview-body" id="exportPreviewBody"></div>
      <div class="modal-actions">
        <button class="ghost-btn" type="button" data-close-modal="exportModal">取消</button>
        <button class="primary-btn" type="button" id="downloadExportBtn">下载文件</button>
      </div>
    </div>
  </div>

  <script src="./platform-data.js"></script>
  <script src="./common.js"></script>
  <script src="./algorithm.js"></script>
</body>
</html>
