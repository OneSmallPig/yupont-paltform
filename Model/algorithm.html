<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算法详情 - 煜邦视觉算法平台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="page-algorithm" data-page="market">
  <div class="page-bg"></div>
  <header class="site-header"></header>

  <main class="main-shell page-shell algorithm-page-shell">
    <nav class="breadcrumb">
      <a href="./index.html">首页</a>
      <span>/</span>
      <a href="./market.html">算法商城</a>
      <span>/</span>
      <strong id="detailBreadcrumb">算法详情</strong>
    </nav>

    <section class="algorithm-page-hero" id="algorithmHero"></section>

    <section class="algorithm-layout">
      <aside class="algorithm-sidebar" id="algorithmSidebar"></aside>

      <div class="algorithm-main">
        <section class="section-card algorithm-workbench" id="algorithmWorkbench">
          <div class="panel-head algorithm-section-head compact-head">
            <div>
              <p class="eyebrow">Online Detection</p>
              <h3>在线检测</h3>
            </div>
          </div>

          <div class="upload-tabs" id="uploadTabs">
            <button class="tab-pill active" type="button" data-upload-tab="image">图片上传</button>
            <button class="tab-pill" type="button" data-upload-tab="media">多媒体流上传</button>
          </div>

          <div class="upload-panel" id="uploadPanel"></div>

          <div class="action-row algorithm-action-row">
            <button class="primary-btn" type="button" id="runDetectionBtn">开始检测</button>
          </div>
        </section>

        <section class="section-card result-section" id="resultSection">
          <div class="panel-head algorithm-section-head compact-head">
            <div>
              <p class="eyebrow">Detection Result</p>
              <h3>检测结果</h3>
            </div>
            <span class="status-chip" id="resultStatus">等待检测</span>
          </div>
          <div class="detection-result-layout">
            <div class="result-preview" id="resultPreview"></div>
            <div class="result-metrics" id="resultMetrics"></div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="./platform-data.js"></script>
  <script src="./common.js"></script>
  <script src="./algorithm.js"></script>
</body>
</html>
